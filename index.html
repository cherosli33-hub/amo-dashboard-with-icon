<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#087f73">
  <meta name="description" content="Pelancar dashboard A.M.O ETD Lepeh">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="A.M.O ETD LEPEH">
  <title>A.M.O ETD LEPEH</title>
  <link rel="manifest" href="./manifest.json?v=3">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=3">
  <link rel="icon" type="image/png" href="./favicon.png?v=3">
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100svh; display: grid; place-items: center; color: #f4fffc; background: radial-gradient(circle at 50% 10%, #24b8a5 0, #087f73 38%, #03483f 100%); padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom)); }
    main { width: min(100%, 420px); text-align: center; }
    .logo { width: 152px; height: 152px; border-radius: 34px; box-shadow: 0 22px 50px rgba(0, 24, 22, .38); }
    h1 { margin: 24px 0 8px; font-size: clamp(1.8rem, 7vw, 2.35rem); letter-spacing: .035em; }
    p { margin: 0 auto 28px; max-width: 32ch; color: #d7fff8; line-height: 1.55; }
    a { display: inline-flex; min-height: 54px; align-items: center; justify-content: center; width: 100%; padding: 0 24px; border-radius: 16px; color: #075a50; background: #fff; font-weight: 800; text-decoration: none; box-shadow: 0 12px 28px rgba(0, 30, 26, .25); }
    small { display: block; margin-top: 18px; color: #bcece5; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="./icon-512.png?v=3" alt="Ikon A.M.O ETD Lepeh">
    <h1>A.M.O ETD LEPEH</h1>
    <p>Dashboard Log Prosedur A.M.O. Tekan butang di bawah untuk membuka dashboard rasmi.</p>
    <a id="launch" href="https://script.google.com/macros/s/AKfycbzifWmcwyfnJQ1yamRaEbondcxfmyiCUKeg_U7XryTD-kQoh3iitOMARH4aP6RcLH94/exec">Buka Dashboard</a>
    <small>Memerlukan sambungan internet</small>
  </main>
  <script>
    const APP_URL = document.getElementById('launch').href;
    const isInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
    if (isInstalled && navigator.onLine) window.setTimeout(() => window.location.replace(APP_URL), 500);
  </script>
</body>
</html>
